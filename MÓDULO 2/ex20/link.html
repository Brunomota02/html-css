<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }

        h1{
            color: blue;

        }
        a{
            text-decoration: none;
            color: red;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
            color: black;
        }
       a:active{
         color: yellow;
       }
       a::after{
        content: '[link]';
        font-weight: normal;
        color: rgb(248, 193, 193);
       }






    </style>
</head>
<body>

    <h1>Personalizando link</h1>

    <div>
        <ul>
            <li><a href="https://www.youtube.com/" target="_blank">Repositório GitHub</a></li>
            <li><a href="https://www.youtube.com/"target="_blank">Canal no YouTube</a></li>
            <li><a href="https://www.youtube.com/"target="_blank">Site Do CursoemVideo</a></li>
        </ul>
        
    </div>
</body>
</html>
