<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando imagens</title>
     
    <style>

        body{
            background-image: url(imagens/wallpaper002.jpg);
            background-repeat: no-repeat;
            background-repeat: repeat-y;
            
        }

        div.quadrado{
            border: 1px solid black;
            width: 300px;
            height: 300px;
            border-radius: 10px;
            display: inline-block;
        }
           
        div#eq1{
            background-color: #b2b5b8;
        }
        div#eq2{
            background-image: linear-gradient( to bottom , yellow , rgb(255, 136, 0));
        }

        div#eq3{
            background-image: url('imagens/pattern003.png');
        }




    </style>

</head>
<body>

    <div class="quadrado" id="eq1">

    </div>
    <div class="quadrado" id="eq2">

    </div>
    <div class="quadrado" id="eq3">

    </div>
    
</body>
</html>
